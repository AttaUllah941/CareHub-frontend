# CareHub frontend — Netlify
#
# Deploy order:
# 1. Deploy backend on Render first and copy its URL
# 2. In Netlify → Site configuration → Environment variables, set:
#      API_URL    = https://YOUR_SERVICE.onrender.com/api/v1
#      SOCKET_URL = https://YOUR_SERVICE.onrender.com
# 3. Deploy / redeploy this site
# 4. On Render, set CORS_ORIGIN + FRONTEND_URL to https://YOUR_SITE.netlify.app
#
# Node 22 is required by @netlify/angular-runtime@4.

[build]
  command = "npm run build:netlify"
  publish = "dist/CareHub-frontend/browser"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/angular-runtime"
