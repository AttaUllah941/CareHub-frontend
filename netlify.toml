# CareHub frontend — Netlify (Angular SSR via @netlify/angular-runtime)
#
# Before first deploy:
# 1. Host CareHub-Backend (Render, Railway, Fly.io, etc.)
# 2. Replace YOUR_BACKEND_URL below with that origin (no trailing slash)
# 3. On the backend set:
#      NODE_ENV=production
#      CORS_ORIGIN=https://YOUR_SITE.netlify.app
#      FRONTEND_URL=https://YOUR_SITE.netlify.app
#      JWT_SECRET / JWT_REFRESH_SECRET to strong unique values
#
# Do NOT also enable a second Angular Runtime plugin from the Netlify UI —
# this file already installs it. If the UI plugin is enabled, keep versions
# aligned (package.json must include @netlify/angular-runtime@^4).

[build]
  command = "npm run build:netlify"
  publish = "dist/CareHub-frontend/browser"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/angular-runtime"

# Proxy API to your hosted backend (relative /api/v1 in environment.production.ts)
[[redirects]]
  from = "/api/*"
  to = "https://YOUR_BACKEND_URL/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://YOUR_BACKEND_URL/uploads/:splat"
  status = 200
  force = true
