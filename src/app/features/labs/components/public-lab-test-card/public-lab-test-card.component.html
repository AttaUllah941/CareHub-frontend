<div class="flex flex-col h-full bg-white rounded-2xl border border-gray-200 p-5 shadow-sm hover:shadow-md hover:border-brand-200 transition-all">
  <div class="flex items-start justify-between gap-3">
    <h3 class="text-base font-bold text-gray-900 leading-snug">{{ test().name }}</h3>
    <span class="shrink-0 rounded-full bg-violet-50 border border-violet-100 px-2.5 py-0.5 text-[10px] font-semibold text-violet-700 uppercase tracking-wide">
      {{ test().category }}
    </span>
  </div>

  <p class="mt-2 text-sm text-gray-600 leading-relaxed flex-1">{{ test().description }}</p>

  <div class="mt-4 flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-500">
    <span>🧪 {{ test().sampleType }}</span>
    <span>⏱ {{ test().turnaroundTime }}</span>
    @if (test().preparation) {
      <span>📋 {{ test().preparation }}</span>
    }
  </div>

  <div class="mt-5 pt-4 border-t border-gray-100 flex items-center justify-between gap-3">
    <div>
      <p class="text-xs text-gray-500">Price</p>
      <p class="text-lg font-bold text-brand-600">{{ formatPrice(test().price) }}</p>
    </div>
    <button
      type="button"
      (click)="openBookingModal()"
      class="inline-flex items-center justify-center px-4 py-2 text-sm font-semibold rounded-lg bg-brand-600 text-white hover:bg-brand-700 transition-colors shrink-0"
    >
      Book Test
    </button>
  </div>
</div>

<app-lab-test-booking-modal
  [open]="bookingModalOpen()"
  [test]="test()"
  [lab]="lab()"
  (closed)="closeBookingModal()"
/>
