    <div class="space-y-4">
      @for (module of moduleKeys(); track module) {
        <div class="border border-gray-200 rounded-lg p-4">
          <h4 class="text-sm font-semibold text-gray-900 uppercase mb-3">{{ module }}</h4>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
            @for (perm of permissionsByModule()[module]; track perm.id) {
              <label class="flex items-start gap-2 text-sm text-gray-700 cursor-pointer">
                <input
                  type="checkbox"
                  [checked]="selectedIds().includes(perm.id)"
                  (change)="toggle(perm.id)"
                  class="mt-0.5 rounded border-gray-300 text-teal-600"
                />
                <span>
                  <span class="font-medium">{{ perm.name }}</span>
                  <span class="block text-xs text-gray-400">{{ perm.slug }}</span>
                </span>
              </label>
            }
          </div>
        </div>
      }
    </div>
