    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Slug</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Module</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
            <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          @if (loading()) {
            <tr><td colspan="5" class="px-4 py-8 text-center text-sm text-gray-500">Loading...</td></tr>
          } @else if (permissions().length === 0) {
            <tr><td colspan="5" class="px-4 py-8 text-center text-sm text-gray-500">No permissions found</td></tr>
          } @else {
            @for (perm of permissions(); track perm.id) {
              <tr class="hover:bg-gray-50">
                <td class="px-4 py-3 text-sm font-medium text-gray-900">{{ perm.name }}</td>
                <td class="px-4 py-3 text-sm text-gray-600 font-mono">{{ perm.slug }}</td>
                <td class="px-4 py-3 text-sm text-gray-600">{{ perm.module }}</td>
                <td class="px-4 py-3 text-sm">
                  <span class="px-2 py-0.5 rounded-full text-xs" [class]="perm.isActive ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'">
                    {{ perm.isActive ? 'Active' : 'Inactive' }}
                  </span>
                </td>
                <td class="px-4 py-3 text-sm text-right">
                  <button type="button" (click)="deletePermission.emit(perm.id)" class="text-red-600 hover:text-red-800">Delete</button>
                </td>
              </tr>
            }
          }
        </tbody>
      </table>
    </div>
