    <div class="space-y-6">
      <a [routerLink]="['/admin/roles', roleId]" class="text-sm text-teal-600">&larr; Back</a>
      <h1 class="text-2xl font-bold">Edit Role</h1>

      @if (roleService.successMessage()) {
        <app-alert [message]="roleService.successMessage()!" variant="success" />
      }

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-xl border p-6">
          <h2 class="text-lg font-semibold mb-4">Role Details</h2>
          <app-role-form
            [form]="form"
            [loading]="roleService.saving()"
            [error]="roleService.error() ?? ''"
            [isEdit]="true"
            (submitted)="onUpdate()"
            (cancelled)="router.navigate(['/admin/roles', roleId])"
          />
        </div>

        <div class="bg-white rounded-xl border p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold">Permission Assignment</h2>
            <app-button [loading]="roleService.saving()" (click)="onSavePermissions()">Save Permissions</app-button>
          </div>
          <app-permission-picker
            [permissionsByModule]="roleService.permissionsByModule()"
            [selectedPermissionIds]="selectedPermissionIds()"
            (selectionChange)="selectedPermissionIds.set($event)"
          />
        </div>
      </div>
    </div>
