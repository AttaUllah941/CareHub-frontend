    <div class="space-y-6 max-w-2xl">
      <a routerLink="/admin/roles" class="text-sm text-teal-600">&larr; Back</a>
      <h1 class="text-2xl font-bold">Create Role</h1>
      <div class="bg-white rounded-xl border p-6">
        <app-role-form
          [form]="form"
          [loading]="roleService.saving()"
          [error]="roleService.error() ?? ''"
          (submitted)="onSubmit()"
          (cancelled)="router.navigate(['/admin/roles'])"
        />
      </div>
    </div>
