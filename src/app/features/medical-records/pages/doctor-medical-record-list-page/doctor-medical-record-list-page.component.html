<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Patient Medical Records</h1>
    <p class="text-sm text-gray-500 mt-1">View and upload patient reports, scans, and images</p>
  </div>

  @if (recordService.error()) {
    <app-alert [message]="recordService.error()!" variant="error" />
  }
  @if (recordService.successMessage()) {
    <app-alert [message]="recordService.successMessage()!" variant="success" />
  }

  @if (!selected()) {
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 flex flex-wrap gap-3 items-end">
      <div class="flex-1 min-w-[200px]">
        <label class="block text-sm font-medium text-gray-700 mb-1">Patient Profile ID</label>
        <input
          type="text"
          [ngModel]="patientProfileId()"
          (ngModelChange)="patientProfileId.set($event)"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
          placeholder="Enter patient profile ID"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
        <select
          [ngModel]="typeFilter()"
          (ngModelChange)="typeFilter.set($event)"
          class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
        >
          <option value="">All</option>
          @for (opt of typeOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </select>
      </div>
      <button
        type="button"
        (click)="searchPatientRecords()"
        class="px-4 py-2 bg-teal-600 text-white text-sm font-medium rounded-lg hover:bg-teal-700"
      >
        Search
      </button>
      <button
        type="button"
        (click)="showUpload.set(!showUpload())"
        class="px-4 py-2 border border-teal-600 text-teal-600 text-sm font-medium rounded-lg hover:bg-teal-50"
      >
        {{ showUpload() ? 'Cancel' : 'Upload' }}
      </button>
    </div>

    @if (showUpload()) {
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Upload for Patient</h2>
        <app-medical-record-upload-form
          [saving]="recordService.saving()"
          [showPatientId]="true"
          (upload)="onUpload($event)"
        />
      </div>
    }
  }

  @if (selected(); as r) {
    <button type="button" (click)="closeDetail()" class="text-sm text-teal-600 hover:text-teal-800">&larr; Back to list</button>
    <app-medical-record-detail
      [record]="r"
      [history]="recordService.recordHistory()"
      [currentVersion]="recordService.currentVersion()"
      [downloading]="recordService.downloading()"
      [saving]="recordService.saving()"
      (download)="onDownload(r)"
      (downloadVersion)="onDownloadVersion($event)"
      (uploadVersion)="onUploadVersion($event)"
    />
  } @else {
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
      <app-medical-record-table
        [records]="recordService.patientRecords()"
        [loading]="recordService.loading()"
        (viewRecord)="onView($event)"
        (downloadRecord)="onDownload($event)"
      />
    </div>
  }
</div>
