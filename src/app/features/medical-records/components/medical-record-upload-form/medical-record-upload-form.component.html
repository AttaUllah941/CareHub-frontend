<form (ngSubmit)="submit()" class="space-y-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Record Type</label>
      <select
        [ngModel]="recordType()"
        (ngModelChange)="recordType.set($event)"
        name="recordType"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      >
        @for (opt of typeOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
      <input
        type="text"
        [ngModel]="title()"
        (ngModelChange)="title.set($event)"
        name="title"
        required
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
        placeholder="e.g. Blood Test Report"
      />
    </div>
  </div>

  @if (showPatientId()) {
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Patient Profile ID</label>
      <input
        type="text"
        [ngModel]="patientProfileId()"
        (ngModelChange)="patientProfileId.set($event)"
        name="patientProfileId"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
        placeholder="Patient profile ID"
      />
    </div>
  }

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Description (optional)</label>
    <textarea
      [ngModel]="description()"
      (ngModelChange)="description.set($event)"
      name="description"
      rows="2"
      class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
    ></textarea>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">File</label>
    <input
      type="file"
      (change)="onFileSelected($event)"
      accept=".pdf,.jpg,.jpeg,.png,.gif,.webp,.dcm,.doc,.docx"
      class="w-full text-sm text-gray-600"
    />
    @if (fileError()) {
      <p class="text-sm text-red-600 mt-1">{{ fileError() }}</p>
    }
    @if (selectedFile(); as f) {
      <p class="text-sm text-gray-500 mt-1">Selected: {{ f.name }} ({{ (f.size / 1024).toFixed(1) }} KB)</p>
    }
  </div>

  <button
    type="submit"
    [disabled]="saving() || !title().trim()"
    class="px-4 py-2 bg-teal-600 text-white text-sm font-medium rounded-lg hover:bg-teal-700 disabled:opacity-50"
  >
    {{ saving() ? 'Uploading...' : 'Upload Record' }}
  </button>
</form>
