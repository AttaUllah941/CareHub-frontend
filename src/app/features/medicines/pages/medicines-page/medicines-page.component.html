<div class="bg-gray-50 min-h-full">
  <div class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <nav class="text-sm text-gray-500 mb-3">
        <a routerLink="/" class="hover:text-brand-600">CareHub</a>
        <span class="mx-2">&gt;</span>
        <span class="text-gray-800">Medicines</span>
      </nav>
      <h1 class="text-2xl sm:text-3xl font-bold text-gray-900">Order Medicines Online</h1>
      <p class="mt-2 text-gray-600">Select your city to browse verified pharmacies and order with home delivery</p>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (city of cities; track city.slug) {
        <a
          [routerLink]="['/medicines', city.slug]"
          class="group bg-white rounded-2xl border border-gray-200 p-6 shadow-sm hover:shadow-lg hover:border-brand-200 transition-all"
        >
          <div class="flex items-center gap-4">
            <span class="flex h-14 w-14 items-center justify-center rounded-2xl bg-amber-50 text-3xl group-hover:scale-105 transition-transform">💊</span>
            <div>
              <h2 class="text-lg font-bold text-gray-900 group-hover:text-brand-600">{{ city.name }}</h2>
              <p class="text-sm text-gray-500 mt-0.5">Browse pharmacies in {{ city.name }}</p>
            </div>
          </div>
          <p class="mt-4 text-sm text-brand-600 font-semibold">View pharmacies →</p>
        </a>
      }
    </div>
  </div>
</div>
