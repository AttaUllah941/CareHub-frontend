<div class="min-h-screen bg-gradient-to-br from-brand-600 to-teal-700 flex items-center justify-center p-4">
  <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-xl">
    <div class="text-center mb-8">
      <span class="inline-flex h-12 w-12 items-center justify-center rounded-xl bg-brand-600 text-white text-xl font-bold mb-3">C</span>
      <h1 class="text-2xl font-bold text-gray-900">Doctor Login</h1>
      <p class="text-sm text-gray-500 mt-1">Access your CareHub doctor dashboard</p>
    </div>

    @if (error()) {
      <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">{{ error() }}</div>
    }

    <form (ngSubmit)="login()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" required class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" required class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm" [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" />
      </div>
      <button type="submit" [disabled]="loading()" class="w-full rounded-lg bg-brand-600 py-2.5 text-sm font-semibold text-white hover:bg-brand-700 disabled:opacity-50">
        {{ loading() ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>

    <div class="mt-6 rounded-xl bg-sky-50 border border-sky-100 p-4 text-sm text-sky-900">
      <p class="font-semibold mb-1">Demo account</p>
      <p>Email: dr.ahmad@carehub.demo</p>
      <p>Password: Doctor@123</p>
    </div>

    <p class="mt-6 text-center text-sm text-gray-500">
      Not registered?
      <a routerLink="/join-as-doctor" class="text-brand-600 font-semibold hover:text-brand-700">Join as Doctor</a>
    </p>
  </div>
</div>
