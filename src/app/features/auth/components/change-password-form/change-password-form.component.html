    <form [formGroup]="form()" (ngSubmit)="submitted.emit()" class="space-y-5">
      <div class="mb-6">
        <h2 class="text-2xl font-bold text-gray-900">Change password</h2>
        <p class="mt-1 text-sm text-gray-500">Update your account password</p>
      </div>

      @if (error()) {
        <app-alert [message]="error()" variant="error" />
      }
      @if (successMessage()) {
        <app-alert [message]="successMessage()" variant="success" />
      }

      <app-input
        label="Current Password"
        type="password"
        formControlName="currentPassword"
        [required]="true"
      />

      <app-input
        label="New Password"
        type="password"
        formControlName="newPassword"
        [required]="true"
      />

      <app-input
        label="Confirm New Password"
        type="password"
        formControlName="confirmPassword"
        [required]="true"
      />

      <app-button type="submit" [loading]="loading()" [fullWidth]="true">
        Update Password
      </app-button>
    </form>
