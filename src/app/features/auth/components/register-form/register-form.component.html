    <form [formGroup]="form()" (ngSubmit)="submitted.emit()" class="space-y-5">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-gray-900">Create account</h2>
        <p class="mt-1 text-sm text-gray-500">Join CareHub healthcare marketplace</p>
      </div>

      <app-alert [message]="error()" />

      <div class="grid grid-cols-2 gap-4">
        <app-input label="First Name" formControlName="firstName" [required]="true" />
        <app-input label="Last Name" formControlName="lastName" [required]="true" />
      </div>

      <app-input label="Email" type="email" formControlName="email" [required]="true" />
      <app-input label="Phone" type="tel" placeholder="+923001234567" formControlName="phone" [required]="true" />

      <div class="space-y-1">
        <label class="block text-sm font-medium text-gray-700">
          I am a <span class="text-red-500">*</span>
        </label>
        <select
          formControlName="role"
          class="block w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm shadow-sm focus:border-brand-500 focus:outline-none focus:ring-1 focus:ring-brand-500"
        >
          <option [value]="UserRole.PATIENT">Patient</option>
          <option [value]="UserRole.DOCTOR">Doctor</option>
          <option [value]="UserRole.CLINIC_MANAGER">Clinic Manager</option>
        </select>
      </div>

      <app-input label="Password" type="password" formControlName="password" [required]="true" />

      <app-button type="submit" [loading]="loading()" [fullWidth]="true">
        Create Account
      </app-button>

      <p class="text-center text-sm text-gray-500">
        Already have an account?
        <a routerLink="/auth/login" class="font-medium text-brand-600 hover:text-brand-500">
          Sign In
        </a>
      </p>
    </form>
