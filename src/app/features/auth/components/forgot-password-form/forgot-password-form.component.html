    <form [formGroup]="form()" (ngSubmit)="submitted.emit()" class="space-y-5">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-gray-900">Forgot password?</h2>
        <p class="mt-1 text-sm text-gray-500">
          Enter your email and we'll send you a reset link
        </p>
      </div>

      @if (error()) {
        <app-alert [message]="error()" variant="error" />
      }
      @if (successMessage()) {
        <app-alert [message]="successMessage()" variant="success" />
      }
      @if (devResetToken()) {
        <div class="rounded-lg bg-amber-50 border border-amber-200 p-3 text-xs text-amber-800 break-all">
          <strong>Dev token:</strong> {{ devResetToken() }}
        </div>
      }

      <app-input
        label="Email"
        type="email"
        placeholder="you@example.com"
        formControlName="email"
        [required]="true"
      />

      <app-button type="submit" [loading]="loading()" [fullWidth]="true">
        Send Reset Link
      </app-button>

      <p class="text-center text-sm text-gray-500">
        Remember your password?
        <a routerLink="/auth/login" class="font-medium text-brand-600 hover:text-brand-500">
          Sign In
        </a>
      </p>
    </form>
