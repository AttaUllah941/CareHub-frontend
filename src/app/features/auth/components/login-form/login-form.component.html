    <form [formGroup]="form()" (ngSubmit)="submitted.emit()" class="space-y-5">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-gray-900">Welcome back</h2>
        <p class="mt-1 text-sm text-gray-500">Sign in to your CareHub account</p>
      </div>

      <app-alert [message]="error()" />

      <app-input
        label="Email"
        type="email"
        placeholder="you@example.com"
        formControlName="email"
        [required]="true"
      />

      <app-input
        label="Password"
        type="password"
        placeholder="Enter your password"
        formControlName="password"
        [required]="true"
      />

      <div class="flex justify-end">
        <a routerLink="/auth/forgot-password" class="text-sm font-medium text-brand-600 hover:text-brand-500">
          Forgot password?
        </a>
      </div>

      <app-button type="submit" [loading]="loading()" [fullWidth]="true">
        Sign In
      </app-button>

      <p class="text-center text-sm text-gray-500">
        Don't have an account?
        <a routerLink="/auth/register" class="font-medium text-brand-600 hover:text-brand-500">
          Register
        </a>
      </p>
    </form>
