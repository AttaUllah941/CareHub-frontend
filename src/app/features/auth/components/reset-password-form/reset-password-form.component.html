    <form [formGroup]="form()" (ngSubmit)="submitted.emit()" class="space-y-5">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-gray-900">Reset password</h2>
        <p class="mt-1 text-sm text-gray-500">Enter your new password below</p>
      </div>

      @if (error()) {
        <app-alert [message]="error()" variant="error" />
      }
      @if (successMessage()) {
        <app-alert [message]="successMessage()" variant="success" />
      }

      <app-input
        label="New Password"
        type="password"
        placeholder="Min 8 chars, upper, lower, number, special"
        formControlName="password"
        [required]="true"
      />

      <app-input
        label="Confirm Password"
        type="password"
        placeholder="Re-enter your password"
        formControlName="confirmPassword"
        [required]="true"
      />

      <app-button type="submit" [loading]="loading()" [fullWidth]="true">
        Reset Password
      </app-button>

      <p class="text-center text-sm text-gray-500">
        <a routerLink="/auth/login" class="font-medium text-brand-600 hover:text-brand-500">
          Back to Sign In
        </a>
      </p>
    </form>
