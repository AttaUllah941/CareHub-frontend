@if (returnUrl()) {
  <p class="mb-4 rounded-lg bg-brand-50 px-4 py-3 text-sm text-brand-800 text-center">
    Sign in to continue to your requested page.
  </p>
}
<app-login-form
      [form]="loginForm"
      [loading]="authService.loading()"
      [error]="authService.error() ?? ''"
      [successMessage]="authService.successMessage() ?? ''"
      (submitted)="onSubmit()"
    />
