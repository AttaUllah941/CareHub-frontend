<form [formGroup]="form()" (ngSubmit)="submitted.emit()" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Diagnosis</label>
    <textarea
      formControlName="diagnosis"
      rows="3"
      class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      placeholder="Primary diagnosis..."
    ></textarea>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Observations</label>
    <textarea
      formControlName="observations"
      rows="4"
      class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      placeholder="Clinical observations..."
    ></textarea>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Doctor Notes</label>
    <textarea
      formControlName="doctorNotes"
      rows="4"
      class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      placeholder="Private clinical notes..."
    ></textarea>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Recommendations</label>
    <textarea
      formControlName="recommendations"
      rows="4"
      class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      placeholder="Treatment plan, follow-up, lifestyle advice..."
    ></textarea>
  </div>

  <div class="flex gap-3 pt-2">
    <app-button type="submit" [loading]="loading()">{{ isEdit() ? 'Update' : 'Save' }} Consultation</app-button>
    <app-button type="button" variant="secondary" (click)="cancelled.emit()">Cancel</app-button>
  </div>
</form>
