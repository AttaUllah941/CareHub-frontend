<div class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Refund Amount (optional)</label>
    <input
      type="number"
      [(ngModel)]="amount"
      [max]="maxAmount()"
      min="0.01"
      step="0.01"
      [placeholder]="'Full refund: ' + maxAmount() + ' ' + currency()"
      class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
    />
    <p class="text-xs text-gray-500 mt-1">Leave empty for full refund (max {{ maxAmount() }} {{ currency() }})</p>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Reason *</label>
    <textarea
      [(ngModel)]="reason"
      rows="3"
      maxlength="500"
      placeholder="Reason for refund..."
      class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
    ></textarea>
  </div>
  <button
    type="button"
    (click)="onSubmit()"
    [disabled]="saving() || !reason.trim()"
    class="w-full px-4 py-2 bg-amber-600 text-white text-sm font-medium rounded-lg hover:bg-amber-700 disabled:opacity-50"
  >
    {{ saving() ? 'Processing...' : 'Process Refund' }}
  </button>
</div>
