<div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
  <h2 class="text-lg font-semibold text-gray-900 mb-4">Pay Consultation Fee</h2>
  <p class="text-2xl font-bold text-teal-600 mb-6">{{ currency() }} {{ amount() | number: '1.0-2' }}</p>

  <div class="space-y-3 mb-6">
    <p class="text-sm font-medium text-gray-700">Select payment method</p>
    @for (opt of gatewayOptions; track opt.value) {
      <label
        class="flex items-center gap-3 p-4 border rounded-lg cursor-pointer transition-colors"
        [class.border-teal-500]="selectedGateway === opt.value"
        [class.bg-teal-50]="selectedGateway === opt.value"
        [class.border-gray-200]="selectedGateway !== opt.value"
      >
        <input
          type="radio"
          name="gateway"
          [value]="opt.value"
          [(ngModel)]="selectedGateway"
          class="text-teal-600"
        />
        <span class="font-medium text-gray-900">{{ opt.label }}</span>
      </label>
    }
  </div>

  <button
    type="button"
    (click)="onSubmit()"
    [disabled]="saving()"
    class="w-full px-4 py-3 bg-teal-600 text-white font-medium rounded-lg hover:bg-teal-700 disabled:opacity-50"
  >
    {{ saving() ? 'Processing...' : 'Proceed to Payment' }}
  </button>
</div>
