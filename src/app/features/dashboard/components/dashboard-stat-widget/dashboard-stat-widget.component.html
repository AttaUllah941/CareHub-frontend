<div class="bg-white rounded-xl border shadow-sm p-5 h-full flex flex-col {{ accentClass() }}">
  <div class="flex items-start justify-between mb-3">
    <div>
      <p class="text-sm font-medium opacity-80">{{ title() }}</p>
      <p class="text-3xl font-bold mt-1 text-gray-900">{{ value() }}</p>
    </div>
    <span class="text-2xl" aria-hidden="true">{{ icon() }}</span>
  </div>
  @if (subtitle()) {
    <p class="text-xs opacity-75 mt-auto">{{ subtitle() }}</p>
  }
  @if (trendLabel(); as label) {
    <p class="text-xs mt-1 font-medium" [class.text-green-700]="trend()! >= 0" [class.text-red-700]="trend()! < 0">
      {{ label }}
    </p>
  }
  @if (link()) {
    <a [routerLink]="link()!" class="text-xs font-medium mt-2 hover:underline">View details →</a>
  }
</div>
