<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Languages</h1>
      <p class="text-sm text-gray-500 mt-1">Manage supported languages for the platform</p>
    </div>
    <a routerLink="/admin/languages/create"><app-button>Create Language</app-button></a>
  </div>

  @if (languageService.error()) { <app-alert [message]="languageService.error()!" variant="error" /> }
  @if (languageService.successMessage()) { <app-alert [message]="languageService.successMessage()!" variant="success" /> }

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 grid grid-cols-1 md:grid-cols-4 gap-4">
    <input
      type="text"
      placeholder="Search languages..."
      [ngModel]="languageService.query().search"
      (ngModelChange)="onSearch($event)"
      class="md:col-span-2 rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-teal-500 focus:outline-none"
    />
    <select
      [ngModel]="languageService.query().isActive"
      (ngModelChange)="onFilter({ isActive: $event, page: 1 })"
      class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
    >
      <option value="">All Status</option>
      <option value="true">Active</option>
      <option value="false">Inactive</option>
    </select>
    <select
      [ngModel]="languageService.query().sortBy"
      (ngModelChange)="onFilter({ sortBy: $event, page: 1 })"
      class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
    >
      <option value="name">Name</option>
      <option value="code">Code</option>
      <option value="nativeName">Native Name</option>
      <option value="createdAt">Created Date</option>
    </select>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
    <app-language-table
      [languages]="languageService.languages()"
      [loading]="languageService.loading()"
      (deleteLanguage)="onDelete($event)"
    />
    <app-pagination
      [page]="languageService.pagination().page"
      [totalPages]="languageService.pagination().totalPages"
      [total]="languageService.pagination().total"
      (pageChange)="onFilter({ page: $event })"
    />
  </div>
</div>
