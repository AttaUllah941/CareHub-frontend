<div class="space-y-6 max-w-2xl">
  <a [routerLink]="['/admin/languages', languageId]" class="text-sm text-teal-600">&larr; Back</a>
  <h1 class="text-2xl font-bold">Edit Language</h1>

  @if (languageService.successMessage()) {
    <app-alert [message]="languageService.successMessage()!" variant="success" />
  }

  <div class="bg-white rounded-xl border p-6">
    <app-language-form
      [form]="form"
      [loading]="languageService.saving()"
      [error]="languageService.error() ?? ''"
      [isEdit]="true"
      (submitted)="onUpdate()"
      (cancelled)="router.navigate(['/admin/languages', languageId])"
    />
  </div>
</div>
