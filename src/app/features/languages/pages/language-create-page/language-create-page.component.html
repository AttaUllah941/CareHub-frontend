<div class="space-y-6 max-w-2xl">
  <a routerLink="/admin/languages" class="text-sm text-teal-600">&larr; Back</a>
  <h1 class="text-2xl font-bold">Create Language</h1>
  <div class="bg-white rounded-xl border p-6">
    <app-language-form
      [form]="form"
      [loading]="languageService.saving()"
      [error]="languageService.error() ?? ''"
      (submitted)="onSubmit()"
      (cancelled)="router.navigate(['/admin/languages'])"
    />
  </div>
</div>
