    <div class="space-y-6 max-w-2xl">
      <div>
        <a [routerLink]="['/admin/users', userId]" class="text-sm text-teal-600 hover:text-teal-800">
          &larr; Back to User
        </a>
        <h1 class="text-2xl font-bold text-gray-900 mt-2">Edit User</h1>
      </div>

      @if (userService.loading()) {
        <p class="text-sm text-gray-500">Loading user...</p>
      } @else {
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
          <app-user-form
            [form]="form"
            [loading]="userService.saving()"
            [error]="userService.error() ?? ''"
            [isEdit]="true"
            (submitted)="onSubmit()"
            (cancelled)="onCancel()"
          />
        </div>
      }

      @if (userService.successMessage()) {
        <app-alert [message]="userService.successMessage()!" variant="success" />
      }
    </div>
