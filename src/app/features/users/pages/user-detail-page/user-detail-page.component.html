    <div class="space-y-6">
      <a routerLink="/admin/users" class="text-sm text-teal-600 hover:text-teal-800">&larr; Back to Users</a>

      @if (userService.error()) {
        <app-alert [message]="userService.error()!" variant="error" />
      }

      @if (userService.loading()) {
        <p class="text-sm text-gray-500">Loading user...</p>
      } @else {
        <app-user-detail-card
          [user]="userService.selectedUser()"
          (deleteUser)="onDelete($event)"
        />
      }
    </div>
