<form [formGroup]="form()" (ngSubmit)="submitted.emit()" class="space-y-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Relationship</label>
      <select formControlName="relationship" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm">
        @for (rel of relationships; track rel.value) {
          <option [value]="rel.value">{{ rel.label }}</option>
        }
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Gender</label>
      <select formControlName="gender" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm">
        <option value="">Select</option>
        <option value="MALE">Male</option>
        <option value="FEMALE">Female</option>
        <option value="OTHER">Other</option>
      </select>
    </div>
    <app-input label="First Name" formControlName="firstName" [required]="true" />
    <app-input label="Last Name" formControlName="lastName" [required]="true" />
    <app-input label="Date of Birth" type="date" formControlName="dateOfBirth" />
    <app-input label="Phone" type="tel" formControlName="phone" />
    <app-input label="Email" type="email" formControlName="email" />
    <app-input label="Notes" formControlName="notes" />
  </div>
  <div class="flex gap-3">
    <app-button type="submit" [loading]="loading()" [disabled]="form().invalid || loading()">
      {{ isEdit() ? 'Save' : 'Add Family Member' }}
    </app-button>
    <app-button type="button" variant="outline" (click)="cancelled.emit()">Cancel</app-button>
  </div>
</form>
