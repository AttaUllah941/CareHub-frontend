<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Patients</h1>
      <p class="text-sm text-gray-500 mt-1">Manage patient profiles and medical records</p>
    </div>
    <a routerLink="/admin/patients/create"><app-button>Create Patient</app-button></a>
  </div>

  @if (patientService.error()) { <app-alert [message]="patientService.error()!" /> }
  @if (patientService.successMessage()) { <app-alert [message]="patientService.successMessage()!" variant="success" /> }

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 grid grid-cols-1 md:grid-cols-4 gap-4">
    <input
      type="text"
      placeholder="Search patients..."
      [ngModel]="patientService.query().search"
      (ngModelChange)="onSearch($event)"
      class="md:col-span-2 rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-teal-500 focus:outline-none"
    />
    <select
      [ngModel]="patientService.query().bloodGroup"
      (ngModelChange)="onFilter({ bloodGroup: $event, page: 1 })"
      class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
    >
      <option value="">All Blood Groups</option>
      @for (bg of bloodGroups; track bg) {
        <option [value]="bg">{{ bg }}</option>
      }
    </select>
    <select
      [ngModel]="patientService.query().isActive"
      (ngModelChange)="onFilter({ isActive: $event, page: 1 })"
      class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
    >
      <option value="">All Status</option>
      <option value="true">Active</option>
      <option value="false">Inactive</option>
    </select>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
    <app-patient-table
      [patients]="patientService.patients()"
      [loading]="patientService.loading()"
      (deletePatient)="onDelete($event)"
    />
    <app-pagination
      [page]="patientService.pagination().page"
      [totalPages]="patientService.pagination().totalPages"
      [total]="patientService.pagination().total"
      (pageChange)="onFilter({ page: $event })"
    />
  </div>
</div>
