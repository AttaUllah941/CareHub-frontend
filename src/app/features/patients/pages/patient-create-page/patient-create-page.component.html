<div class="space-y-6">
  <a routerLink="/admin/patients" class="text-sm text-teal-600 hover:text-teal-800">&larr; Back to Patients</a>
  <h1 class="text-2xl font-bold text-gray-900">Create Patient</h1>

  <app-patient-form
    [form]="form"
    mode="admin"
    [loading]="patientService.saving()"
    [error]="patientService.error() ?? ''"
    (addAllergy)="onAddAllergy()"
    (submitted)="onSubmit()"
    (cancelled)="onCancel()"
  />
</div>
