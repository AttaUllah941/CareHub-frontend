<div class="space-y-6">
  <a [routerLink]="['/admin/patients', patientIdForLink]" class="text-sm text-teal-600 hover:text-teal-800">&larr; Back to Patient</a>
  <h1 class="text-2xl font-bold text-gray-900">Edit Patient</h1>

  @if (patientService.loading() && !patientService.selectedPatient()) {
    <p class="text-sm text-gray-500">Loading patient...</p>
  } @else {
    <app-patient-form
      [form]="form"
      mode="admin"
      [isEdit]="true"
      [loading]="patientService.saving()"
      [error]="patientService.error() ?? ''"
      (addAllergy)="onAddAllergy()"
      (submitted)="onSubmit()"
      (cancelled)="onCancel()"
    />
  }
</div>
