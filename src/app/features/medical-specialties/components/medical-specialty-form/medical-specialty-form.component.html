<form [formGroup]="form()" (ngSubmit)="submitted.emit()" class="space-y-5">
  @if (error()) { <app-alert [message]="error()" variant="error" /> }

  <app-input label="Specialty Name" formControlName="name" placeholder="Cardiology" [required]="true" />

  @if (!isEdit()) {
    <app-input
      label="Slug (lowercase)"
      formControlName="slug"
      placeholder="cardiology"
      [required]="true"
    />
  }

  <div class="space-y-1">
    <label class="block text-sm font-medium text-gray-700">Description</label>
    <textarea
      formControlName="description"
      rows="3"
      placeholder="Brief description of this medical specialty"
      class="block w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"
    ></textarea>
  </div>

  @if (isEdit()) {
    <label class="flex items-center gap-2 text-sm text-gray-700">
      <input type="checkbox" formControlName="isActive" class="rounded border-gray-300 text-teal-600" />
      Active specialty
    </label>
  }

  <div class="flex gap-3">
    <app-button type="submit" [loading]="loading()">
      {{ isEdit() ? 'Update Specialty' : 'Create Specialty' }}
    </app-button>
    <app-button type="button" variant="outline" (click)="cancelled.emit()">Cancel</app-button>
  </div>
</form>
