<div class="space-y-6 max-w-2xl">
  <a [routerLink]="['/admin/medical-specialties', specialtyId]" class="text-sm text-teal-600">&larr; Back</a>
  <h1 class="text-2xl font-bold">Edit Medical Specialty</h1>

  @if (specialtyService.successMessage()) {
    <app-alert [message]="specialtyService.successMessage()!" variant="success" />
  }

  <div class="bg-white rounded-xl border p-6">
    <app-medical-specialty-form
      [form]="form"
      [loading]="specialtyService.saving()"
      [error]="specialtyService.error() ?? ''"
      [isEdit]="true"
      (submitted)="onUpdate()"
      (cancelled)="router.navigate(['/admin/medical-specialties', specialtyId])"
    />
  </div>
</div>
