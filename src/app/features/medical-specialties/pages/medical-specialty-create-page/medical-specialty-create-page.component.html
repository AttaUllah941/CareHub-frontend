<div class="space-y-6 max-w-2xl">
  <a routerLink="/admin/medical-specialties" class="text-sm text-teal-600">&larr; Back</a>
  <h1 class="text-2xl font-bold">Create Medical Specialty</h1>
  <div class="bg-white rounded-xl border p-6">
    <app-medical-specialty-form
      [form]="form"
      [loading]="specialtyService.saving()"
      [error]="specialtyService.error() ?? ''"
      (submitted)="onSubmit()"
      (cancelled)="router.navigate(['/admin/medical-specialties'])"
    />
  </div>
</div>
