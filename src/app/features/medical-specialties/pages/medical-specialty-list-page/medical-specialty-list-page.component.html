<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Medical Specialties</h1>
      <p class="text-sm text-gray-500 mt-1">Manage healthcare specialty reference data</p>
    </div>
    <a routerLink="/admin/medical-specialties/create"><app-button>Create Specialty</app-button></a>
  </div>

  @if (specialtyService.error()) { <app-alert [message]="specialtyService.error()!" variant="error" /> }
  @if (specialtyService.successMessage()) { <app-alert [message]="specialtyService.successMessage()!" variant="success" /> }

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 grid grid-cols-1 md:grid-cols-4 gap-4">
    <input
      type="text"
      placeholder="Search specialties..."
      [ngModel]="specialtyService.query().search"
      (ngModelChange)="onSearch($event)"
      class="md:col-span-2 rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-teal-500 focus:outline-none"
    />
    <select
      [ngModel]="specialtyService.query().isActive"
      (ngModelChange)="onFilter({ isActive: $event, page: 1 })"
      class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
    >
      <option value="">All Status</option>
      <option value="true">Active</option>
      <option value="false">Inactive</option>
    </select>
    <select
      [ngModel]="specialtyService.query().sortBy"
      (ngModelChange)="onFilter({ sortBy: $event, page: 1 })"
      class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
    >
      <option value="name">Name</option>
      <option value="slug">Slug</option>
      <option value="createdAt">Created Date</option>
    </select>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
    <app-medical-specialty-table
      [specialties]="specialtyService.specialties()"
      [loading]="specialtyService.loading()"
      (deleteSpecialty)="onDelete($event)"
    />
    <app-pagination
      [page]="specialtyService.pagination().page"
      [totalPages]="specialtyService.pagination().totalPages"
      [total]="specialtyService.pagination().total"
      (pageChange)="onFilter({ page: $event })"
    />
  </div>
</div>
