<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">My Appointments</h1>
    <p class="text-sm text-gray-500 mt-1">Confirm, complete, and track patient appointments</p>
  </div>

  @if (appointmentService.error()) { <app-alert [message]="appointmentService.error()!" variant="error" /> }
  @if (appointmentService.successMessage()) { <app-alert [message]="appointmentService.successMessage()!" variant="success" /> }

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
    <select [ngModel]="statusFilter()" (ngModelChange)="onFilter($event)" class="rounded-lg border border-gray-300 px-3 py-2 text-sm">
      <option value="">All statuses</option>
      @for (s of statusOptions; track s.value) {
        <option [value]="s.value">{{ s.label }}</option>
      }
    </select>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
    <app-appointment-table
      [appointments]="appointmentService.doctorAppointments()"
      [loading]="appointmentService.loading()"
      [showPatient]="true"
      [doctorMode]="true"
      [showActions]="true"
      videoBasePath="/doctor/video"
      (updateStatus)="onStatusUpdate($event)"
    />
  </div>
</div>
