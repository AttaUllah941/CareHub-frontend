<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Appointments</h1>
    <p class="text-sm text-gray-500 mt-1">Manage all patient appointments and status tracking</p>
  </div>

  @if (appointmentService.error()) { <app-alert [message]="appointmentService.error()!" variant="error" /> }
  @if (appointmentService.successMessage()) { <app-alert [message]="appointmentService.successMessage()!" variant="success" /> }

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 grid grid-cols-1 md:grid-cols-3 gap-4">
    <input
      type="text"
      placeholder="Search reason or notes..."
      [ngModel]="appointmentService.query().search"
      (ngModelChange)="onFilter({ search: $event, page: 1 })"
      class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
    />
    <select
      [ngModel]="appointmentService.query().status"
      (ngModelChange)="onFilter({ status: $event, page: 1 })"
      class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
    >
      <option value="">All statuses</option>
      @for (s of statusOptions; track s.value) {
        <option [value]="s.value">{{ s.label }}</option>
      }
    </select>
    <select
      [ngModel]="appointmentService.query().sortBy"
      (ngModelChange)="onFilter({ sortBy: $event, page: 1 })"
      class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
    >
      <option value="appointmentDate">Appointment Date</option>
      <option value="createdAt">Created Date</option>
      <option value="status">Status</option>
    </select>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
    <app-appointment-table
      [appointments]="appointmentService.appointments()"
      [loading]="appointmentService.loading()"
      [showPatient]="true"
      [adminMode]="true"
      (cancelAppointment)="onCancel($event)"
      (updateStatus)="onStatusUpdate($event)"
    />
    <app-pagination
      [page]="appointmentService.pagination().page"
      [totalPages]="appointmentService.pagination().totalPages"
      [total]="appointmentService.pagination().total"
      (pageChange)="onFilter({ page: $event })"
    />
  </div>
</div>
