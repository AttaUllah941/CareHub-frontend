<form (ngSubmit)="onSubmit()" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
    <select
      [ngModel]="status()"
      (ngModelChange)="status.set($event)"
      name="status"
      class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
    >
      @for (opt of statusOptions; track opt.value) {
        <option [value]="opt.value">{{ opt.label }}</option>
      }
    </select>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Moderation Note</label>
    <textarea
      [ngModel]="moderationNote()"
      (ngModelChange)="moderationNote.set($event)"
      name="moderationNote"
      rows="3"
      maxlength="500"
      class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      placeholder="Internal note (optional)"
    ></textarea>
  </div>

  <button
    type="submit"
    [disabled]="saving()"
    class="px-4 py-2 bg-amber-600 text-white text-sm font-medium rounded-lg hover:bg-amber-700 disabled:opacity-50"
  >
    {{ saving() ? 'Saving...' : 'Apply Moderation' }}
  </button>
</form>
