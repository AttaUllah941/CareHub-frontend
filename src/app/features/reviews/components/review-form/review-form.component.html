<form (ngSubmit)="onSubmit()" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">Rating</label>
    <div class="flex gap-1">
      @for (star of [1, 2, 3, 4, 5]; track star) {
        <button
          type="button"
          (click)="setRating(star)"
          class="text-2xl focus:outline-none"
          [class.text-amber-400]="star <= rating()"
          [class.text-gray-300]="star > rating()"
        >
          ★
        </button>
      }
      <span class="ml-2 text-sm text-gray-500 self-center">{{ rating() }} / 5</span>
    </div>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Title (optional)</label>
    <input
      type="text"
      [ngModel]="title()"
      (ngModelChange)="title.set($event)"
      name="title"
      maxlength="150"
      class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      placeholder="Brief summary"
    />
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Comment</label>
    <textarea
      [ngModel]="comment()"
      (ngModelChange)="comment.set($event)"
      name="comment"
      rows="4"
      maxlength="2000"
      class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      placeholder="Share your experience..."
    ></textarea>
  </div>

  <button
    type="submit"
    [disabled]="saving()"
    class="px-4 py-2 bg-teal-600 text-white text-sm font-medium rounded-lg hover:bg-teal-700 disabled:opacity-50"
  >
    {{ saving() ? 'Saving...' : submitLabel() }}
  </button>
</form>
