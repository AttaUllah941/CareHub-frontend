<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Review Moderation</h1>
    <p class="text-sm text-gray-500 mt-1">Manage ratings, comments, and review visibility</p>
  </div>

  @if (reviewService.error()) {
    <app-alert [message]="reviewService.error()!" variant="error" />
  }
  @if (reviewService.successMessage()) {
    <app-alert [message]="reviewService.successMessage()!" variant="success" />
  }

  @if (viewing(); as r) {
    <button type="button" (click)="closeDetail()" class="text-sm text-teal-600 hover:text-teal-800">&larr; Back to list</button>
    <app-review-detail [review]="r" [showModeration]="true" />
  } @else if (moderating(); as r) {
    <button type="button" (click)="closeDetail()" class="text-sm text-teal-600 hover:text-teal-800">&larr; Back to list</button>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <app-review-detail [review]="r" [showModeration]="true" />
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Moderate Review</h2>
        <app-review-moderation-form
          [saving]="reviewService.saving()"
          [initialStatus]="r.status"
          [initialNote]="r.moderationNote ?? ''"
          (submit)="onSubmitModeration($event)"
        />
      </div>
    </div>
  } @else {
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 flex flex-wrap gap-3">
      <input
        type="text"
        [ngModel]="search()"
        (ngModelChange)="search.set($event)"
        (keyup.enter)="onSearch()"
        placeholder="Search comments..."
        class="flex-1 min-w-[200px] rounded-lg border border-gray-300 px-3 py-2 text-sm"
      />
      <select
        [ngModel]="statusFilter()"
        (ngModelChange)="statusFilter.set($event)"
        class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
      >
        <option value="">All statuses</option>
        @for (opt of statusOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
      <select
        [ngModel]="ratingFilter()"
        (ngModelChange)="ratingFilter.set($event)"
        class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
      >
        <option value="">All ratings</option>
        @for (n of [5, 4, 3, 2, 1]; track n) {
          <option [value]="n">{{ n }} stars</option>
        }
      </select>
      <button
        type="button"
        (click)="onSearch()"
        class="px-4 py-2 bg-teal-600 text-white text-sm font-medium rounded-lg hover:bg-teal-700"
      >
        Search
      </button>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
      <app-review-table
        [reviews]="reviewService.reviews()"
        [loading]="reviewService.loading()"
        [showDoctor]="true"
        [showPatient]="true"
        [showStatus]="true"
        [adminMode]="true"
        (viewReview)="onView($event)"
        (moderateReview)="onModerate($event)"
        (deleteReview)="onDelete($event)"
      />
    </div>

    <app-pagination
      [page]="reviewService.pagination().page"
      [totalPages]="reviewService.pagination().totalPages"
      (pageChange)="onPageChange($event)"
    />
  }
</div>
