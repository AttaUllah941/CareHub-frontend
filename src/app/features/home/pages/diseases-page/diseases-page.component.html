<div class="bg-gray-50 min-h-full">
  <div class="bg-white border-b border-gray-200">
    <div class="page-container py-8">
      <nav class="text-sm text-gray-500 mb-4 flex items-center gap-2">
        <a routerLink="/" class="hover:text-brand-600">CareHub</a>
        <span>&gt;</span>
        <span class="text-gray-800">Diseases</span>
      </nav>
      <h1 class="section-title">
        <app-icon name="clipboard" size="lg" />
        Browse by Disease
      </h1>
      <p class="section-subtitle">Connect with specialists experienced in treating common conditions.</p>
    </div>
  </div>

  <div class="page-container py-8 space-y-6">
    <div class="card card-body flex flex-col sm:flex-row gap-3">
      <input
        type="text"
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
        placeholder="Search diseases..."
        class="input-field flex-1"
      />
      <select
        [ngModel]="selectedCity()"
        (ngModelChange)="selectedCity.set($event)"
        class="select-field sm:w-48"
      >
        @for (city of cities; track city.slug) {
          <option [value]="city.name">{{ city.name }}</option>
        }
      </select>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
      @for (item of filteredDiseases(); track item.slug) {
        <button
          type="button"
          (click)="browseDisease(item)"
          class="card-interactive clickable text-left p-5"
        >
          <span class="text-3xl">{{ item.icon }}</span>
          <h2 class="mt-3 font-semibold text-gray-900">{{ item.name }}</h2>
          @if (item.description) {
            <p class="mt-1 text-sm text-gray-500">{{ item.description }}</p>
          }
          <p class="mt-3 text-xs font-semibold text-brand-600">Find specialists →</p>
        </button>
      } @empty {
        <div class="empty-state sm:col-span-2 lg:col-span-4">
          <p class="text-gray-600">No diseases match your search.</p>
        </div>
      }
    </div>
  </div>
</div>
