<form (ngSubmit)="submit()" class="space-y-4">
  <p class="text-sm text-gray-500">Choose how you receive notifications across email, SMS, push, and in-app.</p>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <label class="flex items-center gap-3 text-sm text-gray-700">
      <input type="checkbox" [ngModel]="emailEnabled()" (ngModelChange)="emailEnabled.set($event)" name="emailEnabled" />
      Email notifications
    </label>
    <label class="flex items-center gap-3 text-sm text-gray-700">
      <input type="checkbox" [ngModel]="smsEnabled()" (ngModelChange)="smsEnabled.set($event)" name="smsEnabled" />
      SMS notifications
    </label>
    <label class="flex items-center gap-3 text-sm text-gray-700">
      <input type="checkbox" [ngModel]="pushEnabled()" (ngModelChange)="pushEnabled.set($event)" name="pushEnabled" />
      Push notifications
    </label>
    <label class="flex items-center gap-3 text-sm text-gray-700">
      <input type="checkbox" [ngModel]="inAppEnabled()" (ngModelChange)="inAppEnabled.set($event)" name="inAppEnabled" />
      In-app notifications
    </label>
    <label class="flex items-center gap-3 text-sm text-gray-700">
      <input
        type="checkbox"
        [ngModel]="appointmentReminders()"
        (ngModelChange)="appointmentReminders.set($event)"
        name="appointmentReminders"
      />
      Appointment reminders (24h & 1h before)
    </label>
    <label class="flex items-center gap-3 text-sm text-gray-700">
      <input
        type="checkbox"
        [ngModel]="prescriptionAlerts()"
        (ngModelChange)="prescriptionAlerts.set($event)"
        name="prescriptionAlerts"
      />
      Prescription ready alerts
    </label>
  </div>

  <button
    type="submit"
    [disabled]="saving()"
    class="px-4 py-2 bg-teal-600 text-white text-sm font-medium rounded-lg hover:bg-teal-700 disabled:opacity-50"
  >
    {{ saving() ? 'Saving...' : 'Save Preferences' }}
  </button>
</form>
