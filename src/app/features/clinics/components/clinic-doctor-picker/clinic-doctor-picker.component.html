<div class="rounded-xl border border-gray-200 bg-white p-4">
  <h3 class="font-semibold text-gray-900 mb-3">Assign Doctors</h3>

  @if (loading()) {
    <p class="text-sm text-gray-500">Loading doctors...</p>
  } @else if (!doctors().length) {
    <p class="text-sm text-gray-400">No doctors available.</p>
  } @else {
    <div class="max-h-64 overflow-y-auto space-y-2">
      @for (doctor of doctors(); track doctor.id) {
        <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer">
          <input
            type="checkbox"
            [checked]="isSelected(doctor.id)"
            (change)="toggle(doctor.id)"
            class="rounded border-gray-300 text-teal-600"
          />
          <div class="min-w-0">
            <p class="text-sm font-medium text-gray-900">{{ doctorLabel(doctor) }}</p>
            <p class="text-xs text-gray-500 truncate">{{ doctor.user?.email }}</p>
          </div>
        </label>
      }
    </div>
    <p class="text-xs text-gray-500 mt-3">{{ selectedIds().length }} doctor(s) selected</p>
  }
</div>
