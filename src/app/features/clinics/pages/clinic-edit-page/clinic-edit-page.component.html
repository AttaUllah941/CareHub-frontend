<div class="space-y-6">
  <a [routerLink]="['/admin/clinics', clinicIdForLink]" class="text-sm text-teal-600 hover:text-teal-800">&larr; Back to Clinic</a>
  <h1 class="text-2xl font-bold text-gray-900">Edit Clinic</h1>

  @if (clinicService.loading() && !clinicService.selectedClinic()) {
    <p class="text-sm text-gray-500">Loading clinic...</p>
  } @else {
    <app-clinic-form
      [form]="form"
      [workingHours]="workingHours()"
      [selectedDoctorIds]="selectedDoctorIds()"
      [doctors]="doctorService.doctors()"
      [doctorsLoading]="doctorService.loading()"
      [loading]="clinicService.saving()"
      [error]="clinicService.error() ?? ''"
      [isEdit]="true"
      (workingHoursChange)="workingHours.set($event)"
      (selectedDoctorIdsChange)="selectedDoctorIds.set($event)"
      (submitted)="onSubmit()"
      (cancelled)="onCancel()"
    />
  }
</div>
