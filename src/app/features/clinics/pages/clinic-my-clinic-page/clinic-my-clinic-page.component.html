<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">My Clinic</h1>
    <p class="text-sm text-gray-500 mt-1">Manage your clinic details, hours, location, and doctors.</p>
  </div>

  @if (clinicService.error()) { <app-alert [message]="clinicService.error()!" /> }
  @if (clinicService.successMessage()) { <app-alert [message]="clinicService.successMessage()!" variant="success" /> }

  @if (clinicService.loading() && !clinicService.myClinic()) {
    <p class="text-sm text-gray-500">Loading clinic...</p>
  } @else if (clinicService.myClinic()) {
    <app-clinic-form
      [form]="form"
      [workingHours]="workingHours()"
      [selectedDoctorIds]="selectedDoctorIds()"
      [doctors]="doctorService.doctors()"
      [doctorsLoading]="doctorService.loading()"
      [loading]="clinicService.saving()"
      [error]="''"
      [isEdit]="true"
      [showAdminFields]="false"
      (workingHoursChange)="workingHours.set($event)"
      (selectedDoctorIdsChange)="selectedDoctorIds.set($event)"
      (submitted)="onSubmit()"
    />
  } @else {
    <app-alert message="No clinic is assigned to your account. Contact an administrator." />
  }
</div>
