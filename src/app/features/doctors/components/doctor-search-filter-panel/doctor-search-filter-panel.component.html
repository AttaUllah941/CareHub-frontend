<div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 space-y-5">
  <div class="flex items-center justify-between">
    <h2 class="text-lg font-semibold text-gray-900">Search Filters</h2>
    <app-button type="button" variant="outline" (click)="onReset()">Reset</app-button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <div class="lg:col-span-3">
      <label class="block text-sm font-medium text-gray-700 mb-1">Doctor Name</label>
      <input
        type="text"
        placeholder="Search by name..."
        [ngModel]="query().name"
        (ngModelChange)="onChange('name', $event)"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-teal-500 focus:outline-none"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Specialty</label>
      <select
        [ngModel]="query().specialtyId"
        (ngModelChange)="onChange('specialtyId', $event)"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      >
        <option value="">All specialties</option>
        @for (s of specialties(); track s.id) {
          <option [value]="s.id">{{ s.name }}</option>
        }
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Clinic</label>
      <select
        [ngModel]="query().clinicId"
        (ngModelChange)="onChange('clinicId', $event)"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      >
        <option value="">All clinics</option>
        @for (c of clinics(); track c.id) {
          <option [value]="c.id">{{ c.name }}</option>
        }
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
      <input
        type="text"
        placeholder="City name"
        [ngModel]="query().city"
        (ngModelChange)="onChange('city', $event)"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Min Fee</label>
      <input
        type="number"
        min="0"
        placeholder="0"
        [ngModel]="query().minFee"
        (ngModelChange)="onChange('minFee', $event)"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Max Fee</label>
      <input
        type="number"
        min="0"
        placeholder="Any"
        [ngModel]="query().maxFee"
        (ngModelChange)="onChange('maxFee', $event)"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Language</label>
      <select
        [ngModel]="query().languageId"
        (ngModelChange)="onChange('languageId', $event)"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      >
        <option value="">All languages</option>
        @for (l of languages(); track l.id) {
          <option [value]="l.id">{{ l.name }}</option>
        }
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Gender</label>
      <select
        [ngModel]="query().gender"
        (ngModelChange)="onChange('gender', $event)"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      >
        <option value="">Any gender</option>
        <option value="MALE">Male</option>
        <option value="FEMALE">Female</option>
        <option value="OTHER">Other</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Min Experience (years)</label>
      <input
        type="number"
        min="0"
        max="70"
        placeholder="0"
        [ngModel]="query().minExperience"
        (ngModelChange)="onChange('minExperience', $event)"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Max Experience (years)</label>
      <input
        type="number"
        min="0"
        max="70"
        placeholder="Any"
        [ngModel]="query().maxExperience"
        (ngModelChange)="onChange('maxExperience', $event)"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Available Day</label>
      <select
        [ngModel]="query().availableDay"
        (ngModelChange)="onChange('availableDay', $event)"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      >
        @for (day of days; track day.value) {
          <option [value]="day.value">{{ day.label }}</option>
        }
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Available Date</label>
      <input
        type="date"
        [ngModel]="query().availableDate"
        (ngModelChange)="onChange('availableDate', $event)"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Sort By</label>
      <select
        [ngModel]="query().sortBy"
        (ngModelChange)="onChange('sortBy', $event)"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
      >
        <option value="yearsOfExperience">Experience</option>
        <option value="consultationFee">Fee</option>
        <option value="createdAt">Newest</option>
      </select>
    </div>
  </div>
</div>
