<div class="space-y-6">
  <a routerLink="/admin/doctors" class="text-sm text-teal-600">&larr; Back to Doctors</a>
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold">Create Doctor</h1>
    <div class="flex gap-2">
      <app-button variant="outline" (click)="addQualification()">Add Qualification</app-button>
      <app-button variant="outline" (click)="addWorkEntry()">Add Work Entry</app-button>
    </div>
  </div>
  <div class="bg-white rounded-xl border p-6">
    <app-doctor-form
      [form]="form"
      mode="create"
      [loading]="doctorService.saving()"
      [error]="doctorService.error() ?? ''"
      [specialties]="specialtyService.allSpecialties()"
      [languages]="languageService.allLanguages()"
      (submitted)="onSubmit()"
      (cancelled)="router.navigate(['/admin/doctors'])"
    />
  </div>
</div>
