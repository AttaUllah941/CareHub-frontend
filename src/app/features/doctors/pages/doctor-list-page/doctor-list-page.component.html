<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Doctors</h1>
      <p class="text-sm text-gray-500 mt-1">Manage doctor profiles and verification</p>
    </div>
    <a routerLink="/admin/doctors/create"><app-button>Create Doctor</app-button></a>
  </div>

  @if (doctorService.error()) { <app-alert [message]="doctorService.error()!" variant="error" /> }
  @if (doctorService.successMessage()) { <app-alert [message]="doctorService.successMessage()!" variant="success" /> }

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 grid grid-cols-1 md:grid-cols-5 gap-4">
    <input
      type="text"
      placeholder="Search doctors..."
      [ngModel]="doctorService.query().search"
      (ngModelChange)="onSearch($event)"
      class="md:col-span-2 rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-teal-500 focus:outline-none"
    />
    <select
      [ngModel]="doctorService.query().verificationStatus"
      (ngModelChange)="onFilter({ verificationStatus: $event, page: 1 })"
      class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
    >
      <option value="">All Verification</option>
      <option value="PENDING">Pending</option>
      <option value="VERIFIED">Verified</option>
      <option value="REJECTED">Rejected</option>
    </select>
    <select
      [ngModel]="doctorService.query().specialtyId"
      (ngModelChange)="onFilter({ specialtyId: $event, page: 1 })"
      class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
    >
      <option value="">All Specialties</option>
      @for (s of specialtyService.allSpecialties(); track s.id) {
        <option [value]="s.id">{{ s.name }}</option>
      }
    </select>
    <select
      [ngModel]="doctorService.query().sortBy"
      (ngModelChange)="onFilter({ sortBy: $event, page: 1 })"
      class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
    >
      <option value="createdAt">Created Date</option>
      <option value="yearsOfExperience">Experience</option>
      <option value="consultationFee">Fee</option>
    </select>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
    <app-doctor-table
      [doctors]="doctorService.doctors()"
      [loading]="doctorService.loading()"
      (deleteDoctor)="onDelete($event)"
    />
    <app-pagination
      [page]="doctorService.pagination().page"
      [totalPages]="doctorService.pagination().totalPages"
      [total]="doctorService.pagination().total"
      (pageChange)="onFilter({ page: $event })"
    />
  </div>
</div>
