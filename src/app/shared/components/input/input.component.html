    <div class="space-y-1">
      @if (label()) {
        <label [for]="inputId" class="block text-sm font-medium text-gray-700">
          {{ label() }}
          @if (required()) {
            <span class="text-red-500">*</span>
          }
        </label>
      }
      <input
        [id]="inputId"
        [type]="type()"
        [placeholder]="placeholder()"
        [disabled]="isDisabled() || isControlDisabled"
        [value]="value"
        (input)="onInput($event)"
        (blur)="onTouched()"
        class="block w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm shadow-sm placeholder:text-gray-400 focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500 disabled:bg-gray-50 disabled:text-gray-500"
        [class.border-red-500]="error()"
      />
      @if (error()) {
        <p class="text-xs text-red-500">{{ error() }}</p>
      }
    </div>
