<div class="min-h-screen bg-gray-50 flex">
  <aside class="hidden lg:flex lg:w-64 flex-col bg-white border-r border-gray-200 shrink-0">
    <div class="p-5 border-b border-gray-100">
      <a routerLink="/" class="flex items-center gap-2.5 group">
        <span class="flex h-10 w-10 items-center justify-center rounded-xl bg-brand-600 text-white font-bold shadow-sm group-hover:bg-brand-700 transition-colors">C</span>
        <div>
          <span class="text-lg font-bold text-brand-600">CareHub</span>
          <p class="text-xs text-gray-500 flex items-center gap-1">
            <app-icon name="stethoscope" size="xs" />
            Doctor Portal
          </p>
        </div>
      </a>
    </div>
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="portal-nav-link-active"
          class="portal-nav-link"
        >
          <span class="icon-box-brand">
            <app-icon [name]="item.icon" size="sm" />
          </span>
          {{ item.label }}
        </a>
      }
    </nav>
    <div class="p-4 border-t border-gray-100">
      @if (authService.user(); as user) {
        <div class="flex items-center gap-3 mb-3">
          <span class="icon-box bg-gray-100 text-gray-600">
            <app-icon name="profile" size="sm" />
          </span>
          <div class="min-w-0">
            <p class="text-sm font-semibold text-gray-900 truncate">{{ user.firstName }} {{ user.lastName }}</p>
            <p class="text-xs text-gray-500 truncate">{{ user.email }}</p>
          </div>
        </div>
      }
      <button type="button" (click)="logout()" class="btn-ghost btn-sm w-full justify-start text-danger-600 hover:text-red-700 hover:bg-danger-50">
        <app-icon name="logout" size="sm" />
        Sign out
      </button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <header class="lg:hidden sticky top-0 z-40 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between shadow-sm">
      <span class="font-bold text-brand-600 flex items-center gap-2">
        <app-icon name="stethoscope" size="sm" />
        Doctor Portal
      </span>
      <button type="button" (click)="logout()" class="btn-ghost btn-sm text-danger-600">
        <app-icon name="logout" size="sm" />
        Sign out
      </button>
    </header>

    <div class="lg:hidden overflow-x-auto scrollbar-hide border-b border-gray-200 bg-white px-3 py-2.5 flex gap-2">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-brand-600 text-white shadow-sm"
          class="shrink-0 inline-flex items-center gap-1.5 rounded-full px-3.5 py-2 text-xs font-medium text-gray-600 bg-gray-100 transition-colors hover:bg-gray-200"
        >
          <app-icon [name]="item.icon" size="xs" />
          {{ item.label }}
        </a>
      }
    </div>

    <main class="flex-1 flex flex-col min-w-0 overflow-auto">
      <div class="hidden lg:flex items-center justify-end border-b border-gray-200 bg-white px-6 py-3">
        <app-notification-bell></app-notification-bell>
      </div>

      <div class="flex-1 p-4 sm:p-6 lg:p-8">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
