<div class="min-h-screen bg-gray-50 flex">
  <aside class="hidden lg:flex lg:w-64 flex-col bg-white border-r border-gray-200 shrink-0">
    <div class="p-5 border-b border-gray-100">
      <a routerLink="/" class="flex items-center gap-2">
        <span class="flex h-9 w-9 items-center justify-center rounded-lg bg-brand-600 text-white font-bold">C</span>
        <div>
          <span class="text-lg font-bold text-brand-600">CareHub</span>
          <p class="text-xs text-gray-500">Doctor Portal</p>
        </div>
      </a>
    </div>
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-brand-50 text-brand-700"
          class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors"
        >
          <span>{{ item.icon }}</span>
          {{ item.label }}
        </a>
      }
    </nav>
    <div class="p-4 border-t border-gray-100">
      @if (authService.user(); as user) {
        <p class="text-sm font-semibold text-gray-900 truncate">{{ user.firstName }} {{ user.lastName }}</p>
        <p class="text-xs text-gray-500 truncate">{{ user.email }}</p>
      }
      <button type="button" (click)="logout()" class="mt-3 w-full text-left text-sm text-red-600 hover:text-red-700 font-medium">Sign out</button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <header class="lg:hidden sticky top-0 z-40 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between">
      <span class="font-bold text-brand-600">Doctor Portal</span>
      <button type="button" (click)="logout()" class="text-sm text-red-600">Sign out</button>
    </header>

    <div class="lg:hidden overflow-x-auto border-b border-gray-200 bg-white px-2 py-2 flex gap-1">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-brand-600 text-white"
          class="shrink-0 rounded-full px-3 py-1.5 text-xs font-medium text-gray-600 bg-gray-100"
        >{{ item.label }}</a>
      }
    </div>

    <main class="flex-1 p-4 sm:p-6 lg:p-8 overflow-auto">
      <router-outlet />
    </main>
  </div>
</div>
